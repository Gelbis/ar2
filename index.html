<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AR2</title>

  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

  <style>
    body { margin: 0; font-family: system-ui, Arial; }
    model-viewer { width: 100vw; height: 100vh; background: #f2f2f2; }
    .arbtn {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      padding: 12px 16px;
      border: 0;
      border-radius: 999px;
      font-size: 16px;
    }
  </style>
</head>

<body>
  <model-viewer
    src="balanco.glb"
    camera-controls
    auto-rotate

    ar
    ar-modes="webxr scene-viewer quick-look"
    ar-placement="floor"
    ar-scale="fixed"

    alt="Modelo 3D">
    <button class="arbtn" slot="ar-button">Ver em AR</button>
  </model-viewer>
</body>
</html>
